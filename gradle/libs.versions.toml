coreKtx = "1.16.0"
junit = "4.13.2"
junitVersion = "1.2.1"
espressoCore = "3.6.1"
activityCompose = "1.10.1"
composeBom = "2025.12.00"
materialIconsCore = "1.7.8"
androidxDatastore = "1.1.7"
serialization = "1.8.1"
googleServices = "4.4.2"
firebaseAnalytics = "23.0.0"
firebaseBom = "34.2.0"
firebaseCrashlytics = "20.0.1"
firebaseFirestore = "25.1.4"
firebaseConfig = "23.0.0"
firebaseCrashlyticsPlugin = "3.0.6"
hilt = "2.56.2"
hiltCompose = "1.2.0"
navigationCompose = "2.8.5"
ksp = "2.1.10-1.0.31"
appcompat = "1.6.1"
material = "1.12.0"
